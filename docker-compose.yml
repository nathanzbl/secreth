services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "6767:6767"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: 6767
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5432/secrethitler
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      seed:
        condition: service_completed_successfully

  seed:
    build: .
    restart: "no"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5432/secrethitler
    command: ["node", "server/dist/server/src/seed.js"]

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - app
